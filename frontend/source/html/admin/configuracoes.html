<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Configurações do Site</title>

    <link rel="stylesheet" href="../styles/main.css">
</head>

<body
    class="admin-page"
    data-admin-page="configuracoes"
    data-page-title="Configurações"
>

    <div class="admin-layout">

        <div id="sidebar-container"></div>

        <div class="admin-layout__content">

            <div id="topbar-container"></div>

            <main class="admin-content-page">

                <section class="admin-page-header">

                    <div>
                        <span class="admin-page-header__tag">
                            CONFIGURAÇÕES
                        </span>

                        <h2>Informações do site</h2>

                        <p>
                            Altere os dados públicos exibidos nas páginas da igreja.
                        </p>
                    </div>

                </section>

                <section class="admin-content-card">

                    <form
                        id="form-configuracoes"
                        class="admin-form"
                    >

                        <div class="admin-form__row">

                            <div class="admin-form__group">
                                <label for="nome-igreja">
                                    Nome da igreja
                                </label>

                                <input
                                    type="text"
                                    id="nome-igreja"
                                    required
                                >
                            </div>

                            <div class="admin-form__group">
                                <label for="nome-pastor">
                                    Nome do pastor
                                </label>

                                <input
                                    type="text"
                                    id="nome-pastor"
                                >
                            </div>

                        </div>

                        <div class="admin-form__group">
                            <label for="foto-pastor">
                                URL da foto do pastor
                            </label>

                            <input
                                type="url"
                                id="foto-pastor"
                                placeholder="https://exemplo.com/foto-pastor.jpg"
                            >
                        </div>

                        <div
                            id="preview-foto-pastor-container"
                            class="admin-image-preview"
                            hidden
                        >
                            <span>
                                Pré-visualização da foto do pastor
                            </span>

                            <img
                                id="preview-foto-pastor"
                                src=""
                                alt="Pré-visualização da foto do pastor"
                            >
                        </div>

                        <div class="admin-form__group">
                            <label for="slogan">
                                Slogan
                            </label>

                            <input
                                type="text"
                                id="slogan"
                                required
                            >
                        </div>

                        <div class="admin-form__group">
                            <label for="texto-apresentacao">
                                Texto de apresentação
                            </label>

                            <textarea
                                id="texto-apresentacao"
                                rows="7"
                            ></textarea>
                        </div>

                        <div class="admin-form__group">
                            <label for="endereco">
                                Endereço
                            </label>

                            <input
                                type="text"
                                id="endereco"
                            >
                        </div>

                        <div class="admin-form__row">

                            <div class="admin-form__group">
                                <label for="telefone">
                                    Telefone
                                </label>

                                <input
                                    type="text"
                                    id="telefone"
                                >
                            </div>

                            <div class="admin-form__group">
                                <label for="whatsapp">
                                    WhatsApp
                                </label>

                                <input
                                    type="text"
                                    id="whatsapp"
                                >
                            </div>

                        </div>

                        <div class="admin-form__group">
                            <label for="email">
                                E-mail
                            </label>

                            <input
                                type="email"
                                id="email"
                            >
                        </div>

                        <div class="admin-form__row">

                            <div class="admin-form__group">
                                <label for="instagram">
                                    Instagram
                                </label>

                                <input
                                    type="url"
                                    id="instagram"
                                    placeholder="https://instagram.com/..."
                                >
                            </div>

                            <div class="admin-form__group">
                                <label for="facebook">
                                    Facebook
                                </label>

                                <input
                                    type="url"
                                    id="facebook"
                                    placeholder="https://facebook.com/..."
                                >
                            </div>

                        </div>

                        <div class="admin-form__group">
                            <label for="youtube">
                                YouTube
                            </label>

                            <input
                                type="url"
                                id="youtube"
                                placeholder="https://youtube.com/..."
                            >
                        </div>

                        <div class="admin-form__group">
                            <label for="logo">
                                URL da logo
                            </label>

                            <input
                                type="url"
                                id="logo"
                                placeholder="https://exemplo.com/logo.png"
                            >
                        </div>

                        <div
                            id="preview-logo-container"
                            class="admin-image-preview"
                            hidden
                        >
                            <span>
                                Pré-visualização da logo
                            </span>

                            <img
                                id="preview-logo"
                                src=""
                                alt="Pré-visualização da logo"
                            >
                        </div>

                        <div class="admin-form__group">
                            <label for="banner">
                                URL do banner
                            </label>

                            <input
                                type="url"
                                id="banner"
                                placeholder="https://exemplo.com/banner.jpg"
                            >
                        </div>

                        <div
                            id="preview-banner-container"
                            class="admin-image-preview"
                            hidden
                        >
                            <span>
                                Pré-visualização do banner
                            </span>

                            <img
                                id="preview-banner"
                                src=""
                                alt="Pré-visualização do banner"
                            >
                        </div>

                        <p
                            id="mensagem-configuracoes"
                            role="alert"
                        ></p>

                        <div class="admin-form__actions">

                            <button
                                type="submit"
                                id="btn-salvar-configuracoes"
                                class="admin-button admin-button--primary"
                            >
                                Salvar configurações
                            </button>

                        </div>

                    </form>

                </section>

            </main>

        </div>

    </div>

    <script
        type="module"
        src="../scripts/admin/layout.js"
    ></script>

    <script
        type="module"
        src="../scripts/admin/configuracoes.js"
    ></script>

</body>

</html>
