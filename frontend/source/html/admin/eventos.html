<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Gerenciar Eventos</title>

    <link rel="stylesheet" href="../styles/main.css">
</head>

<body
    class="admin-page"
    data-admin-page="eventos"
    data-page-title="Eventos"
>

    <div class="admin-layout">

        <div id="sidebar-container"></div>

        <div class="admin-layout__content">

            <div id="topbar-container"></div>

            <main class="admin-content-page">

                <section class="admin-page-header">

                    <div>
                        <span class="admin-page-header__tag">
                            EVENTOS
                        </span>

                        <h2>Gerenciar eventos</h2>

                        <p>
                            Cadastre, edite e organize os eventos exibidos no site.
                        </p>
                    </div>

                    <button
                        type="button"
                        id="btn-novo-evento"
                        class="admin-button admin-button--primary"
                    >
                        + Novo evento
                    </button>

                </section>

                <section class="admin-content-card">

                    <div class="admin-content-card__header">

                        <div>
                            <h2>Eventos cadastrados</h2>

                            <p>
                                Visualize e gerencie todos os eventos.
                            </p>
                        </div>

                        <div class="admin-content-card__filters">

                            <input
                                type="search"
                                id="pesquisa-evento"
                                class="admin-search-input"
                                placeholder="Pesquisar evento..."
                            >

                            <select
                                id="ordenacao-eventos"
                                class="admin-search-input admin-order-select"
                            >
                                <option value="recentes">
                                    Mais recentes
                                </option>

                                <option value="antigos">
                                    Mais antigos
                                </option>

                                <option value="titulo">
                                    Título (A-Z)
                                </option>

                                <option value="ministerio">
                                    Ministério
                                </option>
                            </select>

                        </div>

                    </div>

                    <div class="admin-table-wrapper">

                        <table class="admin-table">

                            <thead>
                                <tr>
                                    <th>Evento</th>
                                    <th>Data</th>
                                    <th>Ministério</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>

                            <tbody id="lista-eventos-admin">
                                <tr>
                                    <td colspan="4">
                                        Carregando eventos...
                                    </td>
                                </tr>
                            </tbody>

                        </table>

                    </div>

                </section>

            </main>

        </div>

    </div>

    <div
        class="admin-modal"
        id="modal-evento"
        aria-hidden="true"
    >

        <div
            class="admin-modal__overlay"
            data-fechar-modal
        ></div>

        <section
            class="admin-modal__content"
            role="dialog"
            aria-modal="true"
            aria-labelledby="titulo-formulario"
        >

            <div class="admin-modal__header">

                <div>
                    <span class="admin-page-header__tag">
                        FORMULÁRIO
                    </span>

                    <h2 id="titulo-formulario">
                        Cadastrar evento
                    </h2>
                </div>

                <button
                    type="button"
                    id="btn-fechar-modal"
                    class="admin-modal__close"
                    aria-label="Fechar formulário"
                >
                    ×
                </button>

            </div>

            <form
                id="form-evento"
                class="admin-form"
            >

                <input
                    type="hidden"
                    id="evento-id"
                >

                <div class="admin-form__group">

                    <label for="titulo">
                        Título
                    </label>

                    <input
                        type="text"
                        id="titulo"
                        maxlength="120"
                        required
                    >

                </div>

                <div class="admin-form__group">

                    <label for="descricao">
                        Descrição
                    </label>

                    <textarea
                        id="descricao"
                        rows="5"
                        maxlength="1000"
                        required
                    ></textarea>

                </div>

                <div class="admin-form__row">

                    <div class="admin-form__group">

                        <label for="data">
                            Data e horário
                        </label>

                        <input
                            type="text"
                            id="data"
                            placeholder="Ex.: Domingo - 19:00"
                            required
                        >

                    </div>

                    <div class="admin-form__group">

                        <label for="ministerio">
                            Ministério
                        </label>

                        <select
                            id="ministerio"
                            required
                        >
                            <option value="">
                                Selecione um ministério
                            </option>
                        </select>

                    </div>

                </div>

                <div class="admin-form__group">

                    <label for="imagem">
                        URL da imagem
                    </label>

                    <input
                        type="url"
                        id="imagem"
                        placeholder="https://exemplo.com/imagem.jpg"
                        required
                    >

                </div>

                <div
                    id="preview-imagem-container"
                    class="admin-image-preview"
                    hidden
                >
                    <span>Pré-visualização</span>

                    <img
                        id="preview-imagem"
                        src=""
                        alt="Pré-visualização da imagem do evento"
                    >
                </div>

                <p
                    id="mensagem-evento"
                    role="alert"
                ></p>

                <div class="admin-form__actions">

                    <button
                        type="button"
                        id="btn-cancelar"
                        class="admin-button admin-button--secondary"
                    >
                        Cancelar
                    </button>

                    <button
                        type="submit"
                        id="btn-salvar"
                        class="admin-button admin-button--primary"
                    >
                        Salvar evento
                    </button>

                </div>

            </form>

        </section>

    </div>

    <script
        type="module"
        src="../scripts/admin/layout.js"
    ></script>

    <script
        type="module"
        src="../scripts/admin/eventos.js"
    ></script>

</body>

</html>
